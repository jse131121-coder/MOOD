<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOYDING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');

        /* S24 최적화 및 기본 셋팅 */
        html, body {
            position: fixed; overflow: hidden; width: 100%; height: 100%;
            font-family: 'Pretendard', sans-serif; margin: 0; padding: 0;
            background-color: #000; /* 외부 배경 블랙 */
        }

        /* 오로라 마블링 배경 (연보라, 연하늘, 연파랑) */
        .aurora-container {
            position: absolute; inset: 0; z-index: -1;
            background: linear-gradient(125deg, #E0F2FE 0%, #EBE9FE 40%, #F5F3FF 70%, #DBEAFE 100%);
            background-size: 300% 300%;
            animation: auroraMove 10s ease infinite;
        }
        @keyframes auroraMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #app {
            height: 100dvh; width: 100%; max-width: 450px;
            display: flex; flex-direction: column; margin: 0 auto;
            position: relative; background: transparent;
        }

        /* 스크롤바 숨기기 */
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* 다크 카드 스타일 (이미지 기반) */
        .dark-card {
            background: rgba(26, 27, 30, 0.95);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 하단 메뉴 그리드 (이미지 고증) */
        .bottom-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 40px 40px 0 0;
            padding: 20px 15px calc(20px + env(safe-area-inset-bottom));
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .nav-btn {
            background: white; border-radius: 18px;
            padding: 12px 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .nav-btn:active { transform: scale(0.92); }
        .nav-btn i { color: #1E0A40; width: 22px; height: 22px; margin-bottom: 4px; }
        .nav-btn span { font-size: 10px; font-weight: 800; color: #1E0A40; text-transform: uppercase; }

        /* 프로필 원형 아바타 */
        .avatar {
            width: 55px; height: 55px; border-radius: 50%;
            background: white; display: flex; align-items: center;
            justify-content: center; font-weight: 900; color: #1E0A40;
            border: 2px solid rgba(255,255,255,0.1); shrink-0;
        }
    </style>
</head>
<body>

    <div class="aurora-container"></div>

    <div id="app">
        <header class="flex items-center justify-between p-6 shrink-0">
            <div class="bg-white/80 backdrop-blur-md px-4 py-1.5 rounded-full text-[#2ECC71] text-xs font-black flex items-center gap-2 shadow-sm">
                <span class="w-2 h-2 bg-[#2ECC71] rounded-full animate-pulse"></span> 포이드
            </div>
            <div class="text-[#1E0A40] font-black tracking-tighter text-xl italic">LOYDING</div>
        </header>

        <main id="main-view" class="flex-1 overflow-y-auto hide-scroll px-5 py-2"></main>

        <nav class="bottom-nav shrink-0 shadow-2xl">
            <button onclick="renderView('call')" class="nav-btn"><i data-lucide="phone"></i><span>Call</span></button>
            <button onclick="renderView('message')" class="nav-btn"><i data-lucide="mail"></i><span>Message</span></button>
            <button onclick="renderView('feed')" class="nav-btn"><i data-lucide="layout-grid"></i><span>Feed</span></button>
            <button onclick="renderView('calendar')" class="nav-btn"><i data-lucide="calendar"></i><span>Calendar</span></button>
            <button onclick="renderView('rory')" class="nav-btn"><i data-lucide="smile"></i><span>Rory</span></button>
            <button onclick="renderView('letter')" class="nav-btn"><i data-lucide="pen-tool"></i><span>Letter</span></button>
            <button onclick="renderView('settings')" class="nav-btn"><i data-lucide="settings"></i><span>Settings</span></button>
            <button onclick="location.reload()" class="nav-btn"><i data-lucide="refresh-cw"></i><span>Refresh</span></button>
        </nav>
    </div>

    <script>
        const mainView = document.getElementById('main-view');

        const content = {
            // 1. 메시지 리스트 (이미지 고증)
            message: `
                <div class="flex items-center justify-between mb-4 mt-2">
                    <h2 class="text-[#1E0A40] text-3xl font-black italic">메시지</h2>
                    <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-sm"><i data-lucide="more-horizontal" class="w-4"></i></div>
                </div>
                <div class="space-y-3">
                    ${['LOYD', '서리닝', 'HARING', '로망망 🐾', 'DANANG', 'LUCA'].map((name, i) => `
                        <div class="dark-card p-5 flex items-center gap-4 active:scale-95 transition-all cursor-pointer">
                            <div class="avatar">${name[0]}</div>
                            <div class="flex-1">
                                <h3 class="text-white font-black text-lg">${name}</h3>
                                <p class="text-gray-400 text-sm font-medium">새로운 메시지가 도착했습니다.</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `,
            // 2. 피드 (인스타 감성)
            feed: `
                <div class="text-[#1E0A40] text-3xl font-black italic mb-6">피드</div>
                <div class="space-y-6 pb-10">
                    <div class="dark-card overflow-hidden">
                        <div class="p-4 flex items-center gap-3">
                            <div class="w-8 h-8 bg-white rounded-full"></div>
                            <span class="text-white font-bold">LOYDING_OFFICIAL</span>
                        </div>
                        <div class="aspect-square bg-gradient-to-br from-purple-400 to-blue-400"></div>
                        <div class="p-4 text-white">
                            <p class="text-sm"><span class="font-bold">LOYDING</span> 오늘 날씨가 너무 좋네요! 다들 뭐하시나요? 🌈</p>
                            <div class="mt-4 flex gap-4 text-gray-400"><i data-lucide="heart"></i><i data-lucide="message-circle"></i></div>
                        </div>
                    </div>
                </div>
            `,
            // 3. 콜 (라이브 화면)
            call: `
                <div class="dark-card h-full flex flex-col p-6 text-white overflow-hidden">
                    <div class="flex items-center justify-between mb-8">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-pink-200 rounded-full"></div>
                            <div><h3 class="font-black text-lg">하리의 라이브 🎂</h3><p class="text-xs text-gray-400">LIVE · 01:24:30</p></div>
                        </div>
                        <button class="bg-white text-black px-4 py-1.5 rounded-lg text-xs font-black italic">EXIT</button>
                    </div>
                    <div class="flex-1 flex items-center justify-center">
                        <div class="w-24 h-24 bg-white/10 rounded-full flex items-center justify-center animate-ping"><i data-lucide="mic" class="w-10 h-10"></i></div>
                    </div>
                    <div class="p-4 bg-white/5 rounded-2xl">
                        <p class="text-sm font-bold text-pink-300">HARING: 다들 들어와줘서 고마워!! ❤️</p>
                    </div>
                </div>
            `,
            // 4. 설정
            settings: `
                <div class="text-[#1E0A40] text-3xl font-black italic mb-6">설정</div>
                <div class="space-y-3">
                    <div class="dark-card p-6 flex justify-between items-center text-white font-bold"><span>프로필 수정</span><i data-lucide="chevron-right"></i></div>
                    <div class="dark-card p-6 flex justify-between items-center text-white font-bold"><span>알림 설정</span><i data-lucide="chevron-right"></i></div>
                    <div class="dark-card p-6 flex justify-between items-center text-white font-bold"><span>다크 모드</span><div class="w-12 h-6 bg-purple-600 rounded-full relative"><div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div></div></div>
                    <div class="dark-card p-6 text-red-400 font-bold">로그아웃</div>
                </div>
            `
        };

        function renderView(viewName) {
            mainView.style.opacity = '0';
            setTimeout(() => {
                mainView.innerHTML = content[viewName] || `<div class="h-full flex items-center justify-center font-black italic text-[#1E0A40] uppercase">${viewName} 준비 중...</div>`;
                mainView.style.opacity = '1';
                lucide.createIcons();
            }, 150);
        }

        // 초기 화면
        renderView('message');
        lucide.createIcons();
    </script>
</body>
</html>
