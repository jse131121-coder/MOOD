<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400&display=swap');
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #ffffff; 
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
        input, textarea { font-family: inherit; }
        .post-item { border-bottom: 1px solid #f0f0f0; }
        .post-item:last-child { border-bottom: none; }
        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="selection:bg-gray-100">

    <nav class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-sm z-50">
        <div class="max-w-2xl mx-auto px-6 py-8 flex justify-between items-baseline">
            <h1 class="text-sm font-light tracking-[0.2em] cursor-pointer" onclick="location.reload()">MOOD</h1>
            <button id="loginBtn" onclick="toggleLogin()" class="text-[10px] tracking-widest text-gray-400 hover:text-black transition-colors">JUST</button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-6 pt-32 pb-40">
        
        <section id="writeSection" class="hidden mb-20">
            <div class="space-y-6">
                <input type="text" id="postTitle" placeholder="제목" class="w-full text-xl font-light outline-none placeholder:text-gray-200">
                <textarea id="postContent" placeholder="내용을 입력하세요." class="w-full h-40 resize-none outline-none text-sm leading-relaxed text-gray-500 placeholder:text-gray-200"></textarea>
                
                <div class="flex items-center justify-between pt-4">
                    <label class="flex items-center gap-2 text-[10px] text-gray-300 cursor-pointer uppercase tracking-tighter">
                        <input type="checkbox" id="postPinned" class="w-3 h-3 rounded-full border-gray-200 checked:bg-black appearance-none border transition-all"> 
                        Pin to top
                    </label>
                    <button onclick="addPost()" class="text-[10px] tracking-[0.2em] border border-black px-6 py-2 hover:bg-black hover:text-white transition-all">POST</button>
                </div>
            </div>
            <div class="h-[1px] bg-gray-100 my-16"></div>
        </section>

        <div id="feedList" class="space-y-20">
            <div class="text-center py-20 text-gray-300 text-xs tracking-widest font-light">
                저장된 기록이 없습니다.
            </div>
        </div>
    </main>

    <script>
        let isLoggedIn = false;
        let posts = [];

        function toggleLogin() {
            isLoggedIn = !isLoggedIn;
            const btn = document.getElementById('loginBtn');
            const section = document.getElementById('writeSection');
            btn.innerText = isLoggedIn ? 'LOGOUT' : 'JUST';
            btn.style.color = isLoggedIn ? 'black' : '';
            section.classList.toggle('hidden');
        }

        function addPost() {
            const title = document.getElementById('postTitle');
            const content = document.getElementById('postContent');
            const pinned = document.getElementById('postPinned');

            if(!title.value || !content.value) return;

            const newPost = {
                id: Date.now(),
                title: title.value,
                content: content.value,
                pinned: pinned.checked,
                date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
                comments: []
            };

            posts = [newPost, ...posts].sort((a, b) => b.pinned - a.pinned);
            title.value = ''; content.value = ''; pinned.checked = false;
            renderPosts();
        }

        function addComment(postId) {
            const input = document.getElementById(`cInput-${postId}`);
            if(!input.value.trim()) return;

            const post = posts.find(p => p.id === postId);
            post.comments.push({ id: Date.now(), text: input.value, replies: [] });
            renderPosts();
        }

        function addReply(postId, commentId) {
            const input = document.getElementById(`rInput-${postId}-${commentId}`);
            if(!input.value.trim()) return;

            const post = posts.find(p => p.id === postId);
            const comment = post.comments.find(c => c.id === commentId);
            comment.replies.push({ id: Date.now(), text: input.value });
            renderPosts();
        }

        function renderPosts() {
            const feed = document.getElementById('feedList');
            if(posts.length === 0) return;

            feed.innerHTML = posts.map(post => `
                <article class="group">
                    <div class="flex items-baseline justify-between mb-6">
                        <h2 class="text-lg font-normal tracking-tight text-gray-900">${post.title}</h2>
                        <div class="flex items-center gap-3">
                            ${post.pinned ? '<span class="text-[9px] tracking-tighter text-gray-300 italic">pinned</span>' : ''}
                            <span class="text-[9px] tracking-widest text-gray-300 uppercase">${post.date}</span>
                        </div>
                    </div>
                    
                    <p class="text-[13px] leading-[1.8] text-gray-500 font-light whitespace-pre-wrap mb-10">
                        ${post.content}
                    </p>

                    <div class="mt-10 pt-6 border-t border-gray-50">
                        <div class="flex items-center gap-3 mb-6">
                            <input id="cInput-${post.id}" type="text" placeholder="Comment" 
                                class="flex-1 text-[11px] font-light outline-none border-b border-transparent focus:border-gray-100 py-1 transition-all">
                            <button onclick="addComment(${post.id})" class="text-[9px] tracking-widest text-gray-400 hover:text-black">SEND</button>
                        </div>

                        <div class="space-y-4">
                            ${post.comments.map(comment => `
                                <div class="group/comment">
                                    <div class="flex justify-between items-start">
                                        <p class="text-[11px] text-gray-400 font-light leading-relaxed">${comment.text}</p>
                                        <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="text-[9px] text-gray-300 ml-2">reply</button>
                                    </div>
                                    
                                    <div class="hidden mt-2 flex items-center gap-2 pl-4">
                                        <input id="rInput-${post.id}-${comment.id}" type="text" placeholder="Reply" 
                                            class="flex-1 text-[10px] font-light outline-none border-b border-gray-50 py-1">
                                        <button onclick="addReply(${post.id}, ${comment.id})" class="text-[9px] text-gray-400">SEND</button>
                                    </div>

                                    <div class="mt-2 space-y-2 pl-4 border-l border-gray-50">
                                        ${comment.replies.map(reply => `
                                            <p class="text-[10px] text-gray-300 font-light italic">↳ ${reply.text}</p>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </article>
            `).join('');
        }
    </script>
</body>
</html>
