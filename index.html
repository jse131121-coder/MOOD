<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #e2e8f0; 
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; margin: 0;
        }
        .mobile-container {
            width: 100%; max-width: 420px; min-height: 100vh;
            background-color: #f8f9fa; position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }
        .just-btn { background-color: #dbeafe; color: white; transition: all 0.2s; }
        .post-card { border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .add-btn { background-color: #dbeafe; box-shadow: 0 4px 15px rgba(219, 234, 254, 0.5); }
        .modal-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 60; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <nav class="bg-white border-b border-gray-100 sticky top-0 z-40">
            <div class="px-6 py-4 flex justify-between items-center">
                <h1 class="text-xl font-bold tracking-tight">MOOD</h1>
                <button id="mainLoginBtn" onclick="openLogin()" class="just-btn px-6 py-2 rounded-xl font-bold text-sm uppercase italic">Just</button>
            </div>
        </nav>

        <main class="px-4 mt-8 pb-20">
            <div class="bg-white post-card p-6 min-h-[400px]">
                <div class="flex justify-between items-center mb-6">
                    <span class="bg-gray-100 px-4 py-1.5 rounded-full text-xs text-gray-500 font-bold">게시글</span>
                    <select class="border-gray-200 border rounded-full px-4 py-1 text-xs outline-none bg-white font-bold">
                        <option>전체</option>
                    </select>
                </div>
                <div id="feed" class="divide-y divide-gray-50">
                    <div id="emptyMsg" class="py-20 text-center text-gray-300 text-sm">아직 작성된 게시글이 없습니다.</div>
                </div>
            </div>
        </main>

        <button id="addBtn" onclick="openWrite()" class="hidden absolute bottom-8 right-8 w-14 h-14 add-btn rounded-full text-white text-3xl flex items-center justify-center z-50 hover:scale-110 transition-transform">+</button>

        <div id="loginModal" class="hidden modal-overlay px-4">
            <div class="bg-white w-full rounded-[30px] p-8 relative">
                <button onclick="closeModal('loginModal')" class="absolute top-6 right-6 text-gray-400 font-bold">X</button>
                <h2 class="text-lg font-bold mb-8 italic">JUST</h2>
                <div class="space-y-6">
                    <input id="userId" type="text" placeholder="SAY (ID)" class="w-full border border-gray-100 rounded-xl px-4 py-3 outline-none font-bold">
                    <input id="userPw" type="password" placeholder="LIKE" class="w-full border border-gray-100 rounded-xl px-4 py-3 outline-none">
                    <div class="flex justify-end gap-3 pt-4">
                        <button onclick="closeModal('loginModal')" class="px-6 py-2 text-xs font-bold text-gray-400 uppercase font-bold">Stop</button>
                        <button onclick="handleLogin()" class="just-btn px-6 py-2 text-xs font-bold rounded-xl uppercase italic">Go</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="writeModal" class="hidden modal-overlay px-4">
            <div class="bg-white w-full rounded-[30px] p-8 max-h-[90vh] overflow-y-auto">
                <h2 id="writeModalTitle" class="text-lg font-bold mb-4 italic font-bold">New Post</h2>
                <input id="postTitle" type="text" placeholder="제목" class="w-full mb-4 border-b border-gray-100 py-2 outline-none font-bold">
                <textarea id="postContent" placeholder="내용을 입력하세요." class="w-full h-32 resize-none outline-none text-sm mb-4 font-bold"></textarea>
                
                <div class="space-y-4 mb-6">
                    <div class="flex items-center justify-between font-bold">
                        <label class="text-xs text-gray-500 font-medium font-bold">📷 사진 업로드</label>
                        <input type="file" id="postImage" accept="image/*" onchange="previewImage(this)" class="text-[10px] w-2/3">
                    </div>
                    <div id="imagePreviewContainer" class="hidden rounded-xl overflow-hidden border border-gray-100 relative font-bold">
                        <img id="imgPreview" src="#" class="w-full h-auto">
                        <button onclick="removeImgPreview()" class="absolute top-2 right-2 bg-black/50 text-white rounded-full w-6 h-6 text-xs font-bold">X</button>
                    </div>
                    <label class="flex items-center gap-2 text-xs text-gray-500 cursor-pointer font-bold">
                        <input type="checkbox" id="postPinned" class="rounded border-gray-300 text-blue-200"> 📌 이 게시물 상단에 고정
                    </label>
                </div>

                <div class="flex justify-end gap-2 border-t pt-4">
                    <button onclick="closeWriteModal()" class="px-4 py-2 text-xs font-bold text-gray-400 uppercase font-bold">Cancel</button>
                    <button id="postSubmitBtn" onclick="savePost()" class="just-btn px-6 py-2 rounded-xl text-xs font-bold uppercase italic font-bold">Post</button>
                </div>
            </div>
        </div>

        <div id="detailModal" class="hidden modal-overlay px-4">
            <div class="bg-white w-full rounded-[30px] p-8 max-h-[85vh] overflow-y-auto relative">
                <button onclick="closeModal('detailModal')" class="absolute top-6 right-6 text-gray-400 font-bold">X</button>
                
                <div id="postDetailContent"></div>
                
                <div id="adminActions" class="hidden flex gap-4 mt-6 pt-4 border-t border-gray-100 font-bold">
                    <button onclick="editPost()" class="text-xs font-bold text-blue-400 italic uppercase">Edit</button>
                    <button onclick="deletePost()" class="text-xs font-bold text-red-400 italic uppercase">Delete</button>
                </div>

                <div class="mt-8 pt-6 border-t border-gray-100 font-bold">
                    <h3 class="text-sm font-bold mb-4 italic">Comments</h3>
                    <div id="commentList" class="space-y-4 mb-6"></div>
                    <div class="flex gap-2 sticky bottom-0 bg-white pt-2 font-bold">
                        <input id="commentInput" type="text" placeholder="댓글을 입력하세요" class="flex-1 bg-gray-50 border border-gray-100 rounded-xl px-4 py-2 text-xs outline-none">
                        <button onclick="addComment()" class="bg-white border border-gray-100 px-4 py-2 rounded-xl text-xs font-bold italic font-bold">등록</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isLoggedIn = false;
        let currentUser = ""; 
        let posts = [];
        let currentPostId = null;
        let tempImgData = null;
        let isEditingMode = false;

        function openLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function openWrite() {
            isEditingMode = false;
            resetWriteForm();
            document.getElementById('writeModalTitle').innerText = "New Post";
            document.getElementById('postSubmitBtn').innerText = "Post";
            document.getElementById('writeModal').classList.remove('hidden');
        }

        function closeWriteModal() {
            document.getElementById('writeModal').classList.add('hidden');
            resetWriteForm();
        }

        function resetWriteForm() {
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            document.getElementById('postPinned').checked = false;
            document.getElementById('postImage').value = '';
            document.getElementById('imagePreviewContainer').classList.add('hidden');
            tempImgData = null;
        }

        function previewImage(input) {
            const container = document.getElementById('imagePreviewContainer');
            const preview = document.getElementById('imgPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    tempImgData = e.target.result;
                    container.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removeImgPreview() {
            document.getElementById('postImage').value = '';
            document.getElementById('imagePreviewContainer').classList.add('hidden');
            tempImgData = null;
        }

        function handleLogin() {
            const idInput = document.getElementById('userId').value;
            currentUser = idInput || "Anonymous";
            isLoggedIn = true;
            document.getElementById('addBtn').classList.remove('hidden');
            document.getElementById('mainLoginBtn').innerText = "Logout";
            closeModal('loginModal');
        }

        function savePost() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const pinned = document.getElementById('postPinned').checked;
            if(!title || !content) return;

            if (isEditingMode) {
                const index = posts.findIndex(p => p.id === currentPostId);
                if (index !== -1) {
                    posts[index].title = title;
                    posts[index].content = content;
                    posts[index].pinned = pinned;
                    posts[index].image = tempImgData;
                }
            } else {
                const post = { 
                    id: Date.now(), 
                    author: currentUser, 
                    title, content, pinned, image: tempImgData,
                    date: new Date().toLocaleString(), comments: [] 
                };
                posts.push(post);
            }
            
            posts.sort((a, b) => b.pinned - a.pinned || b.id - a.id);
            renderFeed();
            closeWriteModal();
            closeModal('detailModal'); // 수정 완료 시 상세 창 닫기
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            const empty = document.getElementById('emptyMsg');
            if(posts.length > 0) empty.classList.add('hidden');
            else empty.classList.remove('hidden');

            feed.innerHTML = posts.map(post => `
                <div onclick="openDetail(${post.id})" class="py-6 cursor-pointer hover:bg-gray-50 transition flex justify-between items-center px-2">
                    <div class="flex items-center gap-2">
                        ${post.pinned ? '<span class="text-orange-400 text-xs">📌</span>' : ''}
                        <h3 class="font-bold text-gray-800 text-sm">${post.title}</h3>
                    </div>
                    <span class="text-[10px] text-gray-300">MOOD ✔</span>
                </div>
            `).join('');
        }

        function openDetail(id) {
            currentPostId = id;
            const post = posts.find(p => p.id === id);
            if (!post) return;

            document.getElementById('postDetailContent').innerHTML = `
                ${post.pinned ? '<p class="text-[10px] text-orange-400 font-bold mb-1">📌 PINNED POST</p>' : ''}
                <h2 class="text-xl font-bold mb-2 font-bold">${post.title}</h2>
                <p class="text-[10px] text-gray-400 mb-4 font-bold font-bold">${post.author} · ${post.date}</p>
                ${post.image ? `<img src="${post.image}" class="w-full rounded-2xl mb-4 font-bold">` : ''}
                <p class="text-sm leading-relaxed text-gray-600 whitespace-pre-wrap font-bold font-normal">${post.content}</p>
            `;
            
            const adminActions = document.getElementById('adminActions');
            if (isLoggedIn) adminActions.classList.remove('hidden');
            else adminActions.classList.add('hidden');

            renderComments();
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function editPost() {
            isEditingMode = true;
            const post = posts.find(p => p.id === currentPostId);
            if (!post) return;
            
            document.getElementById('writeModalTitle').innerText = "Edit Post";
            document.getElementById('postSubmitBtn').innerText = "Update";
            
            document.getElementById('postTitle').value = post.title;
            document.getElementById('postContent').value = post.content;
            document.getElementById('postPinned').checked = post.pinned;
            
            if (post.image) {
                tempImgData = post.image;
                document.getElementById('imgPreview').src = post.image;
                document.getElementById('imagePreviewContainer').classList.remove('hidden');
            } else {
                removeImgPreview();
            }
            
            document.getElementById('writeModal').classList.remove('hidden');
        }

        function deletePost() {
            if (confirm("정말 이 게시물을 삭제하시겠습니까?")) {
                posts = posts.filter(p => p.id !== currentPostId);
                renderFeed();
                closeModal('detailModal');
            }
        }

        function renderComments() {
            const post = posts.find(p => p.id === currentPostId);
            const list = document.getElementById('commentList');
            if (!post) return;

            list.innerHTML = post.comments.map(c => `
                <div class="border-b border-gray-50 pb-3 font-bold">
                    <div class="flex justify-between items-start mb-1 font-bold">
                        <span class="text-[11px] font-bold">무디</span>
                        <span class="text-[9px] text-gray-300">2026.04.22</span>
                    </div>
                    <p class="text-xs text-gray-600 mb-2 font-normal font-bold">${c.text}</p>
                    <div class="flex gap-2 items-center font-bold">
                        <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="text-[9px] text-gray-400">답글 달기</button>
                        <div class="hidden flex-1 flex gap-2 mt-2">
                            <input type="text" placeholder="답글 내용" class="flex-1 text-[10px] border-b outline-none font-normal font-bold">
                            <button onclick="addReply(${c.id}, this.previousElementSibling)" class="text-[9px] font-bold italic font-bold">전송</button>
                        </div>
                    </div>
                    ${c.replies ? c.replies.map(r => `<p class="ml-4 mt-2 text-[10px] text-gray-400 font-normal italic font-bold">↳ ${r}</p>`).join('') : ''}
                </div>
            `).join('');
        }

        function addComment() {
            const input = document.getElementById('commentInput');
            if(!input.value) return;
            const post = posts.find(p => p.id === currentPostId);
            post.comments.push({ id: Date.now(), text: input.value, replies: [] });
            input.value = '';
            renderComments();
        }

        function addReply(commentId, input) {
            if(!input.value) return;
            const post = posts.find(p => p.id === currentPostId);
            const comment = post.comments.find(c => c.id === commentId);
            comment.replies.push(input.value);
            input.value = '';
            renderComments();
        }
    </script>
</body>
</html>
